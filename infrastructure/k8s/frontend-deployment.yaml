apiVersion: apps/v1
kind: Deployment
metadata:
  name: medconnect-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medconnect-frontend
  template:
    metadata:
      labels:
        app: medconnect-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/your-org/medconnect-frontend:latest
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: medconnect-frontend
spec:
  selector:
    app: medconnect-frontend
  ports:
    - port: 80
      targetPort: 3000
  type: LoadBalancer
