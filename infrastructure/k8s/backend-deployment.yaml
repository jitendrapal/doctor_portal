apiVersion: apps/v1
kind: Deployment
metadata:
  name: medconnect-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medconnect-backend
  template:
    metadata:
      labels:
        app: medconnect-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/your-org/medconnect-backend:latest
          ports:
            - containerPort: 3001
          envFrom:
            - secretRef:
                name: medconnect-backend-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: medconnect-backend
spec:
  selector:
    app: medconnect-backend
  ports:
    - port: 3001
      targetPort: 3001
